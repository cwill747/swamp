name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  cache-defaults:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
          - os: ubuntu-24.04-arm
            target: aarch64-linux
          - os: macos-latest
            target: aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: DeterminateSystems/determinate-nix-action@v3

      - uses: DeterminateSystems/flakehub-cache-action@main

      - name: Build default package
        run: nix build

  build-static:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
            package: static
          - os: ubuntu-latest
            target: aarch64-linux
            package: static-aarch64-linux
          - os: macos-latest
            target: aarch64-darwin
            package: static
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build static binary
        run: nix build --print-build-logs .#${{ matrix.package }}

      - name: Prepare artifact
        run: cp result/bin/swamp swamp-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: swamp-${{ matrix.target }}
          path: swamp-${{ matrix.target }}

  release:
    needs:
      - cache-defaults
      - build-static
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            echo "## What's Changed" > release-notes.md
            echo "" >> release-notes.md
            git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" >> release-notes.md
          else
            echo "Initial release" > release-notes.md
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/swamp-*
          body_path: release-notes.md
