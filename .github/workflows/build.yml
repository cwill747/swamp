name: Build and cache

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: cachix/cachix-action@v15
        with:
          name: cwill747-swamp
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build default package
        run: nix build --print-build-logs .#default

  static:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package: static
          - os: ubuntu-latest
            package: static-aarch64-linux
          - os: macos-latest
            package: static
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - uses: cachix/cachix-action@v15
        with:
          name: cwill747-swamp
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build static binary
        run: nix build --print-build-logs .#${{ matrix.package }}
